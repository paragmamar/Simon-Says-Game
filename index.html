<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="ssgame.css">
</head>
<body>
    <p>Simon Says Game</p>
    <h2>Press any key to start</h2>

    <div class="btn-container">
        <div class="button red" id="red" type="button"></div>
        <div class="button green" id="green" type="button"></div>
        <br>
        <div class="button yellow" id="yellow" type="button"></div>
        <div class="button blue" id="blue" type="button"></div>
    </div>


    <script src="ssgame.js"></script>
</body>
</html>
